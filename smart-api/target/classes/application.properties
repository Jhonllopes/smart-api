# ==========================================
# Configurações do Servidor
# ==========================================
server.port=8080

# ==========================================
# Configurações do Banco de Dados (H2 em memória)
# ==========================================
spring.datasource.url=jdbc:h2:mem:smartapi;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 (acesse: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ==========================================
# Configurações Spring AI - OpenAI
# ==========================================
spring.ai.openai.api-key=${OPENAI_API_KEY:sua-chave-aqui}
spring.ai.openai.chat.model=gpt-4o
spring.ai.openai.audio.transcription.model=whisper-1
spring.ai.openai.audio.speech.model=tts-1
spring.ai.openai.audio.speech.voice=alloy

# ==========================================
# Upload de Arquivos (áudio)
# ==========================================
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB